<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueMist's app site</title>
  <link rel="stylesheet" href="dist/output.css">
  <link rel="icon" href="favicon.ico">
</head>
<body class="bg-surface text-text min-h-screen">
  <!-- Header -->
  <header class="border-b border-white/10 backdrop-blur-sm sticky top-0 z-10 bg-surface/80">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold tracking-tight">あおもやの作ったアプリまとめ</h1>
      <p class="text-text-muted text-sm" id="app-count"></p>
    </div>
  </header>

  <!-- Filter Tags -->
  <div class="max-w-6xl mx-auto px-4 pt-6">
    <div id="tag-filter" class="flex gap-2 flex-wrap"></div>
  </div>

  <!-- Gallery Grid -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <footer class="text-center text-text-muted text-xs py-8 border-t border-white/10">
    <p>&copy; 2026 あおもや/BlueMist</p>
  </footer>

  <script src="dist/apps.js"></script>
  <script>
    function getAllTags(apps) {
      const tags = new Set();
      apps.forEach(app => (app.tags || []).forEach(t => tags.add(t)));
      return [...tags].sort();
    }

    function renderTagFilter(tags, onFilter) {
      const container = document.getElementById('tag-filter');
      const allBtn = createTagButton('All', true);
      allBtn.addEventListener('click', () => {
        container.querySelectorAll('button').forEach(b => b.classList.remove('bg-primary', 'text-white'));
        allBtn.classList.add('bg-primary', 'text-white');
        onFilter(null);
      });
      container.appendChild(allBtn);

      tags.forEach(tag => {
        const btn = createTagButton(tag, false);
        btn.addEventListener('click', () => {
          container.querySelectorAll('button').forEach(b => b.classList.remove('bg-primary', 'text-white'));
          btn.classList.add('bg-primary', 'text-white');
          onFilter(tag);
        });
        container.appendChild(btn);
      });
    }

    function createTagButton(label, active) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = `px-3 py-1 rounded-full text-sm transition-colors cursor-pointer border border-white/10 ${
        active ? 'bg-primary text-white' : 'bg-surface-light text-text-muted hover:bg-surface-hover'
      }`;
      return btn;
    }

    function renderGallery(apps) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';
      document.getElementById('app-count').textContent = `${apps.length} apps`;

      apps.forEach(app => {
        const card = document.createElement('div');
        card.className = 'bg-surface-light rounded-xl overflow-hidden border border-white/10 hover:border-primary/50 transition-all hover:-translate-y-1';
        card.innerHTML = `
          <div class="aspect-video bg-surface overflow-hidden">
            <img src="${app.thumbnail}" alt="${app.name}"
              class="w-full h-full object-cover"
              onerror="this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-text-muted text-4xl\\'>&#128230;</div>'" />
          </div>
          <div class="p-4">
            <h3 class="font-semibold text-lg mb-1">${app.name}</h3>
            <p class="text-text-muted text-sm mb-3 line-clamp-2">${app.description}</p>
            <div class="flex flex-wrap gap-1 mb-3">
              ${(app.tags || []).map(t => `<span class="text-xs px-2 py-0.5 rounded-full bg-primary/20 text-primary">${t}</span>`).join('')}
            </div>
            <div class="flex gap-2">
              ${app.links.github ? `<a href="${app.links.github}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                GitHub</a>` : ''}
              ${app.links.booth ? `<a href="${app.links.booth}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg bg-white/10 hover:bg-white/20 transition-colors">
                Booth</a>` : ''}
              ${app.links.web ? `<a href="${app.links.web}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 px-3 py-1.5 text-sm rounded-lg bg-primary hover:bg-primary-dark text-white transition-colors">
                Open App</a>` : ''}
            </div>
          </div>`;
        gallery.appendChild(card);
      });
    }

    function init() {
      const apps = APPS_DATA;
      const tags = getAllTags(apps);

      if (tags.length > 0) {
        renderTagFilter(tags, (tag) => {
          const filtered = tag ? apps.filter(a => (a.tags || []).includes(tag)) : apps;
          renderGallery(filtered);
        });
      }
      renderGallery(apps);
    }

    init();
  </script>
</body>
</html>
